<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNEST Member Savings Calculator</title>
    <meta name="description" content="Estimate your future savings with the KNEST Member Savings Calculator. Calculate contributions, interest, and total growth.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

    <main class="calculator-card">
        <header>
            <h1>KNEST Member Savings Calculator</h1>
            <p class="subtitle">Estimate your savings based on your monthly contribution</p>
        </header>

        <form id="calcForm">
            <div class="form-group">
                <label for="monthlyContribution">Monthly Contribution (KES)</label>
                <div class="input-wrapper">
                    <input type="number" id="monthlyContribution" placeholder="e.g. 5000" required min="1">
                </div>
            </div>

            <div class="form-group">
                <label for="months">Number of Months</label>
                <div class="input-wrapper">
                    <input type="number" id="months" placeholder="e.g. 12" required min="1">
                </div>
            </div>

            <div class="form-group">
                <label for="annualRate">Annual Interest Rate (%)</label>
                <div class="input-wrapper">
                    <input type="number" id="annualRate" step="0.01" placeholder="e.g. 10" required min="0">
                </div>
            </div>

            <button type="submit">Calculate</button>
        </form>

        <section id="results" class="results-section">
            <div class="result-item">
                <span class="result-label">Total Contributions</span>
                <span class="result-value" id="resTotalContrib">KES 0</span>
            </div>
            <div class="result-item">
                <span class="result-label">Interest Earned</span>
                <span class="result-value" id="resInterest">KES 0</span>
            </div>
            <div class="total-savings">
                <span class="result-label">Total Savings</span>
                <span class="result-value" id="resTotalSavings">KES 0</span>
            </div>
        </section>
    </main>

    <script src="static/js/script.js"></script>
</body>
</html>
